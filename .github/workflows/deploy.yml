name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # กด deploy เองได้จากหน้า Actions

# ให้ deploy ทีละงาน ไม่ชนกันถ้า push รัว
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build (ฝัง backend URL production ลง PWA)
        run: npm run build
        env:
          VITE_GROUP_WS: wss://moto-trip-group.thanachai-bos.workers.dev

      # Pages ก่อน — ให้เว็บอัปเดตเสมอ แม้ worker deploy จะติดสิทธิ์ KV
      - name: Deploy Pages (เว็บแอป)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=moto-trip-planner --branch=main

      # Worker (กลุ่ม realtime + KV sync) — ต้องการ token perm: Workers Scripts:Edit + Workers KV Storage:Edit
      - name: Deploy Worker
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
