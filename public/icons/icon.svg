<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#c2410c"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- winding road -->
  <path d="M120 400 C 180 300, 120 250, 220 210 S 340 180, 300 110"
        fill="none" stroke="#ffffff" stroke-width="26" stroke-linecap="round"
        stroke-dasharray="4 34" opacity="0.95"/>
  <path d="M120 400 C 180 300, 120 250, 220 210 S 340 180, 300 110"
        fill="none" stroke="#ffffff" stroke-width="46" stroke-linecap="round" opacity="0.18"/>
  <!-- motorcycle wheels -->
  <circle cx="170" cy="360" r="46" fill="none" stroke="#0f172a" stroke-width="20"/>
  <circle cx="360" cy="360" r="46" fill="none" stroke="#0f172a" stroke-width="20"/>
  <circle cx="170" cy="360" r="10" fill="#0f172a"/>
  <circle cx="360" cy="360" r="10" fill="#0f172a"/>
  <!-- body -->
  <path d="M170 360 L250 300 L330 300 L360 360" fill="none" stroke="#0f172a" stroke-width="20" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M250 300 q 20 -46 70 -30" fill="none" stroke="#0f172a" stroke-width="20" stroke-linecap="round"/>
  <!-- pin -->
  <circle cx="300" cy="110" r="34" fill="#0f172a"/>
  <circle cx="300" cy="110" r="14" fill="#ffffff"/>
</svg>
